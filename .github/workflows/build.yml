name: Build Windows

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build Windows EXE
      run: |
        npm install -g pkg
        pkg . --targets node18-win-x64 --output resume-generator.exe
    
    - name: Create release package
      run: |
        mkdir resume-generator-windows
        copy resume-generator.exe resume-generator-windows\
        xcopy /E /I templates resume-generator-windows\templates\
        xcopy /E /I examples resume-generator-windows\examples\
        echo @echo off > resume-generator-windows\启动.bat
        echo chcp 65001 ^>nul >> resume-generator-windows\启动.bat
        echo resume-generator.exe >> resume-generator-windows\启动.bat
        echo pause >> resume-generator-windows\启动.bat
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0
        files: resume-generator-windows/**
        body: |
          ## 简历生成器 Windows 版
          
          ### 使用方法
          1. 下载 resume-generator-windows.zip
          2. 解压到任意文件夹
          3. 双击 `启动.bat` 运行
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
