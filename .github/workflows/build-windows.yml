name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build Windows CLI
      run: |
        npm install -g pkg
        npm run build:win
        mkdir -p dist/templates dist/examples
        cp -r templates/* dist/templates/
        cp -r examples/* dist/examples/
    
    - name: Create CLI package
      run: |
        cd dist
        zip -r resume-generator-cli-windows.zip resume-generator.exe templates/ examples/
    
    - name: Upload CLI artifact
      uses: actions/upload-artifact@v3
      with:
        name: cli-windows
        path: dist/resume-generator-cli-windows.zip

  build-gui:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install CLI dependencies
      run: npm ci
    
    - name: Install GUI dependencies
      run: |
        cd gui
        npm ci
    
    - name: Build GUI for Windows
      run: |
        cd gui
        npm run build:win
    
    - name: Upload GUI artifact
      uses: actions/upload-artifact@v3
      with:
        name: gui-windows
        path: gui/dist/*.exe

  release:
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts
    
    - name: List artifacts
      run: find artifacts -type f | sort
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
